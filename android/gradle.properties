org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Work around the Kotlin Build-Tools-API incremental-cache corruption on Windows
# ("Could not close incremental caches ... is already registered"). Disabling
# incremental Kotlin compilation and running the compiler in a separate daemon
# avoids the shared in-process cache that triggers it.
kotlin.incremental=false
kotlin.compiler.execution.strategy=out-of-process
